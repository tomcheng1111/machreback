<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>系統跳轉中...</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding-top: 100px; color: #333; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>正在連線至機台管理系統...</p>
    
    <script>
        const gasBaseUrl = "https://script.google.com/macros/s/AKfycbyJa_mkGBzdK1kuspVFa75CC3nROPD-XFtMSaI317uW91EFu24Pin0zygW-Mi43PIuUZA/exec";
        
        // 抓取掃描 QR Code 帶進來的參數 (mid=CNC-A004)
        const params = new URLSearchParams(window.location.search);
        
        // 塞入系統參數
        params.set('v', 'new'); 
        params.set('t', new Date().getTime()); // 動態時間戳記破除快取
        
        const finalUrl = gasBaseUrl + "?" + params.toString();
        
        // 跳轉
        window.location.replace(finalUrl);
    </script>
</body>
</html>
